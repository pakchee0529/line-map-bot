<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>周囲200mの電柱</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #f7f7f7;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }
    .meta {
      font-size: 14px;
      margin-bottom: 10px;
      line-height: 1.6;
    }
    #map {
      height: 55vh;
      min-height: 360px;
      border-radius: 10px;
      overflow: hidden;
      background: #ddd;
    }
    .list {
      margin-top: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .item {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .item:last-child {
      border-bottom: none;
    }
    .pole-name {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .distance {
      color: #555;
      font-size: 14px;
      margin-bottom: 4px;
    }
    a {
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>現在地周囲 {{ radius|int }}m の電柱</h1>
    <div class="meta">
      現在地: {{ center_lat }}, {{ center_lng }}<br>
      件数: {{ nearby|length }}件
    </div>

    <div id="map"></div>

    <div class="list">
      {% if nearby %}
        {% for pole in nearby %}
          <div class="item">
            <div class="pole-name">{{ pole.name }}</div>
            <div class="distance">{{ pole.distance_m }}m</div>
            <a href="{{ pole.google_maps_url }}" target="_blank" rel="noopener noreferrer">
              Googleマップで開く
            </a>
          </div>
        {% endfor %}
      {% else %}
        200m以内に電柱はありませんでした。
      {% endif %}
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const centerLat = {{ center_lat | tojson }};
    const centerLng = {{ center_lng | tojson }};
    const radius = {{ radius | tojson }};
    const poles = {{ nearby | tojson }};

    const map = L.map('map').setView([centerLat, centerLng], 18);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.marker([centerLat, centerLng]).addTo(map)
      .bindPopup("現在地")
      .openPopup();

    L.circle([centerLat, centerLng], {
      radius: radius
    }).addTo(map);

    poles.forEach(pole => {
      L.marker([pole.lat, pole.lng]).addTo(map)
        .bindPopup(
          `<b>${pole.name}</b><br>${pole.distance_m}m<br>` +
          `<a href="${pole.google_maps_url}" target="_blank" rel="noopener noreferrer">Googleマップで開く</a>`
        );
    });
  </script>
</body>
</html>
